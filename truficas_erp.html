<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truficas del Río Pilas — Panel de gestión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ─── RESET & VARS ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gd:#1C3829;--gm:#2D5A3D;--gl:#E4EFE8;
  --gold:#9A6F30;--goldb:#F5EDD9;
  --ink:#1A1A18;--muted:#6B7169;--rule:#D8DBD5;
  --bg:#F5F3EF;--surface:#FFFFFF;--surface2:#F0EDE7;
  --red:#B03020;--redb:#FDECEA;
  --amber:#7A5010;--amberb:#FDF3E0;
  --radius:10px;--radius-sm:6px;
  --sidebar:240px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.6;min-height:100vh}
button{font-family:'DM Sans',sans-serif;cursor:pointer}
input,select,textarea{font-family:'DM Sans',sans-serif;font-size:14px}
h1,h2,h3{font-weight:500}

/* ─── LOGIN ─── */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;background:var(--gd);
}
.login-box{
  background:var(--surface);border-radius:16px;
  padding:40px;width:360px;
}
.login-logo{
  font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gd);
  text-align:center;margin-bottom:4px;
}
.login-logo span{display:block;font-size:11px;font-weight:400;
  text-transform:uppercase;letter-spacing:.1em;color:var(--muted);
  font-family:'DM Sans',sans-serif;margin-top:4px}
.login-rule{height:1px;background:var(--rule);margin:20px 0}
.login-field{margin-bottom:16px}
.login-field label{display:block;font-size:12px;font-weight:500;
  color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.login-field input{
  width:100%;padding:10px 12px;border:1px solid var(--rule);
  border-radius:var(--radius-sm);font-size:14px;color:var(--ink);
  outline:none;transition:border-color .15s;background:var(--bg);
}
.login-field input:focus{border-color:var(--gm)}
.login-btn{
  width:100%;padding:11px;background:var(--gd);color:#fff;
  border:none;border-radius:var(--radius-sm);font-size:14px;
  font-weight:500;transition:background .15s;margin-top:4px;
}
.login-btn:hover{background:var(--gm)}
.login-error{
  background:var(--redb);color:var(--red);font-size:13px;
  padding:8px 12px;border-radius:var(--radius-sm);margin-top:12px;display:none;
}

/* ─── APP SHELL ─── */
#app{display:none;min-height:100vh}

/* ─── SIDEBAR ─── */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:var(--sidebar);
  background:var(--gd);display:flex;flex-direction:column;z-index:200;
}
.sb-brand{padding:22px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-brandname{
  font-family:'Cormorant Garamond',serif;font-size:17px;color:#fff;line-height:1.2}
.sb-brandsub{font-size:10px;color:rgba(255,255,255,.4);
  text-transform:uppercase;letter-spacing:.09em;margin-top:3px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sb-section{font-size:9px;font-weight:500;text-transform:uppercase;
  letter-spacing:.1em;color:rgba(255,255,255,.3);padding:16px 10px 6px}
.sb-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;
  border-radius:var(--radius-sm);color:rgba(255,255,255,.65);
  font-size:13px;cursor:pointer;transition:all .15s;margin-bottom:2px;
  border:none;background:transparent;width:100%;text-align:left;
}
.sb-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-item.active{background:rgba(255,255,255,.13);color:#fff}
.sb-item .ic{
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.sb-bottom{
  padding:14px 8px;border-top:1px solid rgba(255,255,255,.08);
}
.sb-user{
  display:flex;align-items:center;gap:10px;padding:8px 10px;margin-bottom:4px;
}
.sb-avatar{
  width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;font-size:12px;
  font-weight:500;color:#fff;flex-shrink:0;
}
.sb-username{font-size:12px;color:rgba(255,255,255,.8)}
.sb-role{font-size:10px;color:rgba(255,255,255,.4)}
.sb-logout{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  color:rgba(255,255,255,.5);font-size:12px;cursor:pointer;
  border:none;background:transparent;width:100%;border-radius:var(--radius-sm);
  transition:all .15s;
}
.sb-logout:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8)}

/* ─── MAIN CONTENT ─── */
.main{margin-left:var(--sidebar);min-height:100vh}
.topbar{
  background:var(--surface);border-bottom:1px solid var(--rule);
  padding:0 28px;height:56px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;
}
.topbar-title{font-size:15px;font-weight:500;color:var(--ink)}
.topbar-sub{font-size:12px;color:var(--muted)}
.topbar-actions{display:flex;gap:8px}
.content{padding:28px}

/* ─── BUTTONS ─── */
.btn{
  padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;
  font-weight:500;border:1px solid var(--rule);background:var(--surface);
  color:var(--ink);cursor:pointer;transition:all .15s;display:inline-flex;
  align-items:center;gap:6px;
}
.btn:hover{background:var(--surface2);border-color:#bbb}
.btn-primary{background:var(--gd);color:#fff;border-color:var(--gd)}
.btn-primary:hover{background:var(--gm);border-color:var(--gm)}
.btn-danger{background:var(--redb);color:var(--red);border-color:#f0c0bc}
.btn-danger:hover{background:#fbd8d5;border-color:var(--red)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-gold{background:var(--goldb);color:var(--gold);border-color:#e8d5b0}
.btn-gold:hover{background:#ede0c4}

/* ─── CARDS & GRID ─── */
.card{
  background:var(--surface);border:1px solid var(--rule);
  border-radius:var(--radius);
}
.card-header{
  padding:16px 20px;border-bottom:1px solid var(--rule);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.card-body{padding:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}

/* ─── METRICS ─── */
.metric{
  background:var(--surface);border:1px solid var(--rule);
  border-radius:var(--radius);padding:16px 18px;
}
.metric-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;
  color:var(--muted);font-weight:500;margin-bottom:6px}
.metric-value{font-size:26px;font-weight:500;color:var(--ink);line-height:1}
.metric-sub{font-size:12px;color:var(--muted);margin-top:4px}

/* ─── BADGE ─── */
.badge{
  display:inline-flex;align-items:center;gap:4px;font-size:11px;
  font-weight:500;padding:3px 9px;border-radius:999px;
}
.badge-green{background:var(--gl);color:var(--gm)}
.badge-amber{background:var(--amberb);color:var(--amber)}
.badge-red{background:var(--redb);color:var(--red)}
.badge-gray{background:var(--surface2);color:var(--muted)}

/* ─── LABEL ─── */
.field-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;
  color:var(--muted);font-weight:500;margin-bottom:5px}

/* ─── TABLE ─── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid var(--rule)}
th{text-align:left;font-size:11px;font-weight:500;text-transform:uppercase;
  letter-spacing:.07em;color:var(--muted);padding:10px 12px}
td{padding:12px 12px;font-size:13px;border-bottom:.5px solid var(--rule);
  vertical-align:middle;color:var(--ink)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg)}

/* ─── FORM ─── */
.form-field{margin-bottom:14px}
.form-field label{display:block;font-size:12px;font-weight:500;
  color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.form-field input,.form-field select,.form-field textarea{
  width:100%;padding:9px 11px;border:1px solid var(--rule);
  border-radius:var(--radius-sm);font-size:13px;color:var(--ink);
  outline:none;transition:border-color .15s;background:var(--surface);
}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{
  border-color:var(--gm);
}
.form-field textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ─── MODAL ─── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;
  display:none;align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--surface);border-radius:var(--radius);width:600px;
  max-width:95vw;max-height:90vh;display:flex;flex-direction:column;
}
.modal-header{
  padding:18px 22px;border-bottom:1px solid var(--rule);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-size:16px;font-weight:500}
.modal-close{
  background:none;border:none;font-size:20px;color:var(--muted);
  cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1;
}
.modal-close:hover{background:var(--surface2)}
.modal-body{padding:22px;overflow-y:auto;flex:1}
.modal-footer{
  padding:14px 22px;border-top:1px solid var(--rule);
  display:flex;justify-content:flex-end;gap:8px;
}

/* ─── PRINT ─── */
@media print{
  body{background:#fff!important}
  .sidebar,.topbar,.no-print,.modal-overlay{display:none!important}
  .main{margin-left:0!important}
  .content{padding:0!important}
  .print-card{
    border:1px solid #ddd!important;border-radius:8px!important;
    padding:24px!important;page-break-inside:avoid!important;
    margin-bottom:24px!important;
  }
}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:24px;right:24px;background:var(--gd);color:#fff;
  padding:12px 18px;border-radius:var(--radius-sm);font-size:13px;
  z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s;
  pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1}

/* ─── UTILS ─── */
.flex{display:flex}.items-center{align-items:center}.gap-2{gap:8px}
.gap-3{gap:12px}.justify-between{justify-content:space-between}
.mb-4{margin-bottom:16px}.mb-3{margin-bottom:12px}.mb-2{margin-bottom:8px}
.mt-4{margin-top:16px}.text-muted{color:var(--muted)}
.text-sm{font-size:12px}.text-xs{font-size:11px}
.font-serif{font-family:'Cormorant Garamond',serif}
.divider{height:1px;background:var(--rule);margin:16px 0}
.tag-fab-propia{display:inline-flex;align-items:center;gap:4px;font-size:11px;
  font-weight:500;padding:3px 9px;border-radius:999px;
  background:#E4EFE8;color:#2D5A3D}
.tag-fab-externo{display:inline-flex;align-items:center;gap:4px;font-size:11px;
  font-weight:500;padding:3px 9px;border-radius:999px;
  background:var(--amberb);color:var(--amber)}
.section-gap{margin-bottom:24px}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-state .es-icon{font-size:32px;margin-bottom:12px;opacity:.4}
.stock-bar{height:6px;border-radius:3px;background:var(--rule);overflow:hidden}
.stock-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      Truficas del Río Pilas
      <span>Panel de gestión</span>
    </div>
    <div class="login-rule"></div>
    <div class="login-field">
      <label>Usuario</label>
      <input type="text" id="login-user" placeholder="usuario" autocomplete="username">
    </div>
    <div class="login-field">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error">Usuario o contraseña incorrectos</div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sb-brand">
      <div class="sb-brandname">Truficas del Río Pilas</div>
      <div class="sb-brandsub">Panel de gestión</div>
    </div>
    <div class="sb-nav">
      <div class="sb-section">Principal</div>
      <button class="sb-item active" onclick="showView('dashboard',this)">
        <span class="ic">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </span>
        Dashboard
      </button>
      <div class="sb-section">Catálogo</div>
      <button class="sb-item" onclick="showView('fichas',this)">
        <span class="ic">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
        </span>
        Fichas de producto
      </button>
      <div class="sb-section">Operaciones</div>
      <button class="sb-item" onclick="showView('stock',this)">
        <span class="ic">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path d="M20 7H4a1 1 0 00-1 1v10a1 1 0 001 1h16a1 1 0 001-1V8a1 1 0 00-1-1z"/>
            <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
          </svg>
        </span>
        Control de stock
      </button>
      <div class="sb-section">Sistema</div>
      <button class="sb-item" onclick="showView('ajustes',this)">
        <span class="ic">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </span>
        Ajustes
      </button>
    </div>
    <div class="sb-bottom">
      <div class="sb-user">
        <div class="sb-avatar" id="sb-avatar">A</div>
        <div>
          <div class="sb-username" id="sb-username">Admin</div>
          <div class="sb-role" id="sb-role">Administrador</div>
        </div>
      </div>
      <button class="sb-logout" onclick="doLogout()">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
        </svg>
        Cerrar sesión
      </button>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="topbar-title">Dashboard</div>
        <div class="topbar-sub" id="topbar-sub">Resumen general</div>
      </div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ═══ MODAL FICHA ═══ -->
<div class="modal-overlay" id="modal-ficha">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-ficha-title">Nueva ficha</div>
      <button class="modal-close" onclick="closeModal('modal-ficha')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="ficha-id">
      <div class="form-row">
        <div class="form-field">
          <label>Nombre del producto</label>
          <input type="text" id="f-nombre" placeholder="Ej: Trufa negra con sal">
        </div>
        <div class="form-field">
          <label>Referencia</label>
          <input type="text" id="f-ref" placeholder="TRP-SAL-001">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>Categoría</label>
          <input type="text" id="f-categoria" placeholder="Condimento · Sal gourmet">
        </div>
        <div class="form-field">
          <label>Fabricación</label>
          <select id="f-fab">
            <option value="propia">Fabricación propia</option>
            <option value="externo">Fabricación externa</option>
          </select>
        </div>
      </div>
      <div class="form-field">
        <label>Descripción</label>
        <textarea id="f-desc" rows="3" placeholder="Descripción comercial del producto..."></textarea>
      </div>
      <div class="form-field">
        <label>Ingredientes</label>
        <textarea id="f-ingredientes" rows="2" placeholder="Sal marina, trufa negra (T. melanosporum) mín. 3%"></textarea>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>Formato / Presentación</label>
          <input type="text" id="f-formato" placeholder="Tarro cristal 60 g">
        </div>
        <div class="form-field">
          <label>Conservación</label>
          <input type="text" id="f-conservacion" placeholder="Lugar fresco y seco">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>Uso recomendado</label>
          <input type="text" id="f-uso" placeholder="Acabado en carnes, huevos...">
        </div>
        <div class="form-field">
          <label>Maridaje</label>
          <input type="text" id="f-maridaje" placeholder="Foie, risotto, pasta fresca">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>Temporada</label>
          <input type="text" id="f-temporada" placeholder="Disponible todo el año">
        </div>
        <div class="form-field">
          <label>Alérgenos</label>
          <input type="text" id="f-alergenos" placeholder="Sin alérgenos de declaración...">
        </div>
      </div>
      <div class="form-field">
        <label>PVP hostelería (€)</label>
        <input type="number" id="f-pvp" placeholder="0.00" step="0.01">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-ficha')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveFicha()">Guardar ficha</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL STOCK ═══ -->
<div class="modal-overlay" id="modal-stock">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-stock-title">Editar stock</div>
      <button class="modal-close" onclick="closeModal('modal-stock')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="stock-id">
      <div class="form-row">
        <div class="form-field">
          <label>Referencia</label>
          <input type="text" id="s-ref" readonly style="background:var(--bg);color:var(--muted)">
        </div>
        <div class="form-field">
          <label>Producto</label>
          <input type="text" id="s-nombre" readonly style="background:var(--bg);color:var(--muted)">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>Cantidad actual (unidades)</label>
          <input type="number" id="s-cantidad" min="0">
        </div>
        <div class="form-field">
          <label>Stock mínimo</label>
          <input type="number" id="s-minimo" min="0">
        </div>
      </div>

function doLogin(){
  const u = document.getElementById('login-user').value.trim();

  state.currentUser = user;

  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('sb-username').textContent = user.name;
  document.getElementById('sb-role').textContent = user.role==='admin'?'Administrador':'Editor';
  document.getElementById('sb-avatar').textContent = user.initials;
  showView('dashboard', document.querySelector('.sb-item'));
}

function doLogout(){
  sessionStorage.removeItem('truf_session');
  state.currentUser = null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
}

document.getElementById('login-pass').addEventListener('keydown',e=>{

    dashboard:['Dashboard','Resumen general'],
    fichas:['Fichas de producto','Catálogo Truficas del Río Pilas'],
    stock:['Control de stock','Inventario por referencia'],
    ajustes:['Ajustes','Configuración del sistema']
  };
  const [t,s] = titles[view]||['',''];
  document.getElementById('topbar-title').textContent = t;
  document.getElementById('topbar-sub').textContent = s;
  document.getElementById('topbar-actions').innerHTML = '';
  const views = {dashboard:renderDashboard,fichas:renderFichas,stock:renderStock,ajustes:renderAjustes};

      <div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500">${f.nombre}</div>

        ${renderFichaField('Conservación',f.conservacion)}
        ${renderFichaField('Uso',f.uso)}
        ${renderFichaField('Maridaje',f.maridaje)}
        ${renderFichaField('Temporada',f.temporada)}

      <button class="btn btn-sm" onclick="openFichaModal('${f.id}')">Editar</button>
      <button class="btn btn-sm btn-danger" onclick="deleteFicha('${f.id}')">Eliminar</button>
    </div>
  </div>`).join('');
}

function renderFichaField(label,value,span=''){
  if(!value) return '';
  return `<div style="${span==='full'?'grid-column:1/-1':''}">
    <div class="field-label">${label}</div>
    <div style="font-size:13px;color:var(--ink)">${value}</div>
  </div>`;
}

function openFichaModal(id){
  const el = id ? state.fichas.find(f=>f.id===id) : null;
  document.getElementById('modal-ficha-title').textContent = el ? 'Editar ficha' : 'Nueva ficha';
  document.getElementById('ficha-id').value = el?.id||'';
  ['nombre','ref','categoria','desc','ingredientes','formato','conservacion','uso','maridaje','temporada','alergenos'].forEach(k=>{
    document.getElementById('f-'+k).value = el?.[k]||'';
  });
  document.getElementById('f-fab').value = el?.fab||'propia';
  document.getElementById('f-pvp').value = el?.pvp||'';
  document.getElementById('modal-ficha').classList.add('open');
}

function saveFicha(){
  const id = document.getElementById('ficha-id').value;
  const data = {
    id: id||'f'+Date.now(),
    nombre:document.getElementById('f-nombre').value.trim(),
    ref:document.getElementById('f-ref').value.trim(),
    categoria:document.getElementById('f-categoria').value.trim(),
    fab:document.getElementById('f-fab').value,
    desc:document.getElementById('f-desc').value.trim(),
    ingredientes:document.getElementById('f-ingredientes').value.trim(),
    formato:document.getElementById('f-formato').value.trim(),
    conservacion:document.getElementById('f-conservacion').value.trim(),
    uso:document.getElementById('f-uso').value.trim(),
    maridaje:document.getElementById('f-maridaje').value.trim(),
    temporada:document.getElementById('f-temporada').value.trim(),
    alergenos:document.getElementById('f-alergenos').value.trim(),
    pvp:parseFloat(document.getElementById('f-pvp').value)||0
  };
  if(!data.nombre){showToast('El nombre es obligatorio','error');return;}
  if(id){
    const idx = state.fichas.findIndex(f=>f.id===id);
    state.fichas[idx]=data;
  } else {
    state.fichas.push(data);
    // auto-add stock entry
    if(!state.stock.find(s=>s.fichaId===data.id)){
      state.stock.push({id:'s'+Date.now(),fichaId:data.id,ref:data.ref,nombre:data.nombre,cantidad:0,minimo:10,lote:'',caducidad:'',notas:''});
    }
  }
  saveData();
  closeModal('modal-ficha');
  renderFichasGrid();
  showToast(id?'Ficha actualizada':'Ficha creada');
}

function deleteFicha(id){
  if(!confirm('¿Eliminar esta ficha de producto?')) return;
  state.fichas = state.fichas.filter(f=>f.id!==id);
  state.stock = state.stock.filter(s=>s.fichaId!==id);
  saveData();
  renderFichasGrid();
  showToast('Ficha eliminada');
}

function printFicha(id){
  const card = document.getElementById('ficha-card-'+id);
  if(!card) return;
  const btns = card.querySelectorAll('.no-print');
  btns.forEach(b=>b.style.display='none');
  window.print();
  btns.forEach(b=>b.style.display='');
}

              <td class="text-xs text-muted">${cad}</td>
              <td>
                <button class="btn btn-sm" onclick="openStockModal('${s.id}')">Editar</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function openStockModal(id){
  const s = state.stock.find(x=>x.id===id);
  if(!s) return;
  document.getElementById('stock-id').value = s.id;
  document.getElementById('s-ref').value = s.ref;
  document.getElementById('s-nombre').value = s.nombre;
  document.getElementById('s-cantidad').value = s.cantidad;
  document.getElementById('s-minimo').value = s.minimo;
  document.getElementById('s-lote').value = s.lote||'';
  document.getElementById('s-caducidad').value = s.caducidad||'';
  document.getElementById('s-notas').value = s.notas||'';
  document.getElementById('modal-stock').classList.add('open');
}

function saveStock(){
  const id = document.getElementById('stock-id').value;
  const idx = state.stock.findIndex(s=>s.id===id);
  if(idx<0) return;
  state.stock[idx].cantidad = parseInt(document.getElementById('s-cantidad').value)||0;
  state.stock[idx].minimo = parseInt(document.getElementById('s-minimo').value)||0;
  state.stock[idx].lote = document.getElementById('s-lote').value.trim();
  state.stock[idx].caducidad = document.getElementById('s-caducidad').value;
  state.stock[idx].notas = document.getElementById('s-notas').value.trim();
  saveData();
  closeModal('modal-stock');
  renderStock();
  showToast('Stock actualizado');
}

function syncQBS(){
  showToast('QBS: Conexión API pendiente de configurar. Configura las credenciales en Ajustes.','info');
}

function showQBSInfo(){
  showView('ajustes', document.querySelectorAll('.sb-item')[4]);
}

// ═══════════════════════════════════════════
// AJUSTES
// ═══════════════════════════════════════════
function renderAjustes(){
  document.getElementById('content').innerHTML = `
  <div style="max-width:600px;display:flex;flex-direction:column;gap:20px">

    <div class="card">
      <div class="card-header"><div style="font-weight:500">Usuarios del sistema</div>
        <button class="btn btn-sm btn-primary" onclick="addUser()">+ Añadir usuario</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Usuario</th><th>Nombre</th><th>Rol</th><th></th></tr></thead>
          <tbody id="users-table">
            ${state.users.map(u=>`<tr>
              <td class="text-muted">${u.username}</td>
              <td style="font-weight:500">${u.name}</td>
              <td>${u.role==='admin'?'<span class="badge badge-green">Admin</span>':'<span class="badge badge-gray">Editor</span>'}</td>
              <td>
                ${u.id!==state.currentUser?.id?`<button class="btn btn-sm btn-danger" onclick="deleteUser('${u.id}')">Eliminar</button>`:'<span class="text-xs text-muted">Tú</span>'}
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><div style="font-weight:500">Cambiar mi contraseña</div></div>
      <div class="card-body">
        <div class="form-field">
          <label>Contraseña actual</label>
          <input type="password" id="pwd-current" placeholder="••••••••">
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>Nueva contraseña</label>
            <input type="password" id="pwd-new" placeholder="••••••••">
          </div>
          <div class="form-field">
            <label>Confirmar</label>
            <input type="password" id="pwd-confirm" placeholder="••••••••">
          </div>
        </div>
        <button class="btn btn-primary" onclick="changePassword()">Actualizar contraseña</button>
      </div>
    </div>

    <div class="card" style="border-color:#e8d090;background:var(--amberb)">
      <div class="card-header" style="border-color:#e8d090">
        <div style="font-weight:500;color:var(--amber)">Integración QBS (TrazabilidadQBS)</div>
        <span class="badge badge-amber">Pendiente</span>
      </div>
      <div class="card-body">
        <div class="text-sm text-muted mb-4">Cuando dispongas de las credenciales REST de QBS, introduce los datos aquí para activar la sincronización automática de stock.</div>
        <div class="form-field">
          <label>URL endpoint QBS</label>
          <input type="url" id="qbs-url" value="${localStorage.getItem('qbs_url')||''}" placeholder="https://api.qbs.es/v1/">
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>API Key / Usuario</label>
            <input type="text" id="qbs-key" value="${localStorage.getItem('qbs_key')||''}" placeholder="API key o usuario">
          </div>
          <div class="form-field">
            <label>Contraseña / Token</label>
            <input type="password" id="qbs-token" value="${localStorage.getItem('qbs_token')||''}" placeholder="••••••••">
          </div>
        </div>
        <button class="btn" onclick="saveQBS()">Guardar configuración QBS</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><div style="font-weight:500">Datos del sistema</div></div>
      <div class="card-body">
        <div class="text-sm text-muted mb-4">Los datos se almacenan en el navegador (localStorage). Usa los botones para exportar o restaurar.</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn" onclick="exportData()">Exportar datos (JSON)</button>
          <button class="btn btn-danger" onclick="resetData()">Restaurar datos de ejemplo</button>
        </div>
      </div>
    </div>

  </div>`;
}

function addUser(){
  const username = prompt('Nombre de usuario:');
  if(!username) return;
  if(state.users.find(u=>u.username===username)){showToast('Usuario ya existe','error');return;}
  const password = prompt('Contraseña:');
  if(!password) return;
  const name = prompt('Nombre visible:') || username;
  const role = confirm('¿Administrador? (Cancelar = Editor)') ? 'admin':'editor';
  state.users.push({
    id:'u'+Date.now(),username,password,name,role,
    initials:name.substring(0,2).toUpperCase()
  });
  saveData(); renderAjustes();
  showToast('Usuario creado');
}

function deleteUser(id){
  if(!confirm('¿Eliminar este usuario?')) return;
  state.users = state.users.filter(u=>u.id!==id);
  saveData(); renderAjustes();
  showToast('Usuario eliminado');
}

function changePassword(){
  const cur = document.getElementById('pwd-current').value;
  const nw = document.getElementById('pwd-new').value;
  const con = document.getElementById('pwd-confirm').value;
  const user = state.users.find(u=>u.id===state.currentUser.id);
  if(!user || user.password!==cur){showToast('Contraseña actual incorrecta','error');return;}
  if(nw.length<6){showToast('Mínimo 6 caracteres','error');return;}
  if(nw!==con){showToast('Las contraseñas no coinciden','error');return;}
  user.password=nw; saveData();
  showToast('Contraseña actualizada');
}

function saveQBS(){
  localStorage.setItem('qbs_url',document.getElementById('qbs-url').value);
  localStorage.setItem('qbs_key',document.getElementById('qbs-key').value);
  localStorage.setItem('qbs_token',document.getElementById('qbs-token').value);
  showToast('Configuración QBS guardada. Pendiente de activar conexión.');
}

function exportData(){
  const data = {fichas:state.fichas, stock:state.stock, users:state.users.map(u=>({...u,password:'***'}))};
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'truficas_datos_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}

function resetData(){
  if(!confirm('¿Restaurar todos los datos de ejemplo? Se perderán los cambios.')) return;
  localStorage.removeItem('truf_fichas');
  localStorage.removeItem('truf_stock');
  state.fichas = JSON.parse(JSON.stringify(FICHAS_DEFAULT));
  state.stock = JSON.parse(JSON.stringify(STOCK_DEFAULT));
  saveData(); renderAjustes();
  showToast('Datos restaurados');
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function closeModal(id){
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('open'); });
});

function showToast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type==='error'?'var(--red)':type==='info'?'#2D5A3D':'var(--gd)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
loadState();
if(state.currentUser){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('sb-username').textContent = state.currentUser.name;
  document.getElementById('sb-role').textContent = state.currentUser.role==='admin'?'Administrador':'Editor';
  document.getElementById('sb-avatar').textContent = state.currentUser.initials;
  showView('dashboard', document.querySelector('.sb-item'));
}
</script>
</body>
</html>
